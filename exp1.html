<!DOCTYPE html>
<html>
<head>
    <title>OL and UL Example</title>
</head>
<body>

<h2>Ordered and Unordered List Example</h2>

<!-- Ordered List -->
<h3>Fruits (Ordered List)</h3>
<ol type="1">
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ol>

<!-- Unordered List -->
<h3>Animals (Unordered List)</h3>
<ul>
    <li>Dog</li>
    <li>Cat</li>
    <li>Rabbit</li>
</ul>

</body>
</html>
